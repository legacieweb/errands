<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard - Errands</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .leaflet-routing-container {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1rem;
            color: var(--text);
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.8rem;
            box-shadow: var(--shadow-lg);
        }
        .tab-group {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.25rem;
            border-radius: var(--radius-md);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow);
        }
        .map-wrapper {
            position: relative;
            height: 500px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .map-overlay {
            position: absolute;
            bottom: 1.5rem;
            left: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            text-align: center;
        }
    </style>
</head>
<body id="rider-view">
    <div id="auth-modal" class="modal">
        <div class="modal-content glass">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 class="logo" style="margin-bottom: 0.5rem; justify-content: center;">Errands<span>.</span></h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Rider Logistics Portal</p>
            </div>
            
            <form id="rider-login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="rider-login-username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="rider-login-password" placeholder="••••••••" required>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: -0.5rem; margin-bottom: 1rem;">
                    <input type="checkbox" id="show-rider-password" style="width: auto;" onchange="togglePassword('rider-login-password')">
                    <label for="show-rider-password" style="margin-bottom: 0; font-size: 0.85rem; cursor: pointer;">Show Password</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div class="container" id="rider-dashboard" style="display: none;">
        <header class="dashboard-header animate-fade">
            <div class="header-main">
                <a href="#" class="logo">Errands<span>.</span> Rider</a>
                <p style="color: var(--text-muted); font-size: 0.875rem; font-weight: 500; margin-top: 0.25rem;">Logistics Command Center</p>
            </div>
            
            <div style="display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;">
                <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end;">
                    <span id="rider-name" style="font-weight: 700; color: var(--text);">Rider</span>
                    <span style="font-size: 0.75rem; color: var(--success); font-weight: 600; display: flex; align-items: center; gap: 0.4rem;">
                        <span style="width: 6px; height: 6px; background: var(--success); border-radius: 50%;"></span>
                        ACTIVE DUTY
                    </span>
                </div>
                <button onclick="logout()" class="btn btn-danger btn-sm">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <div class="dashboard-grid">
            <main class="main-content animate-fade">
                <div style="display: grid; grid-template-columns: 1fr; gap: 2rem;">
                    <!-- Mission Panel -->
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                                Assignments
                            </h2>
                            <span class="badge badge-primary">Real-time Feed</span>
                        </div>
                        <div id="order-display" style="padding: 1.5rem;">
                            <div style="text-align: center; padding: 3rem 1rem;">
                                <p style="color: var(--text-muted);">Initializing telemetry...</p>
                            </div>
                        </div>
                    </section>

                    <!-- Map Section -->
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                Navigation
                            </h2>
                        </div>
                        <div class="map-wrapper">
                            <div id="map"></div>
                            <div class="map-overlay glass animate-fade" id="map-notice">
                                <p style="color: var(--text); font-weight: 600;">System ready. Accept a mission to begin navigation.</p>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="app.js"></script>
</body>
</html>
